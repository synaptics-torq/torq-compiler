description: Ensure snapshot release exists for push builds

inputs:
  github_token:
    description: GitHub token with release write access
    required: true
  repository:
    description: Repository in owner/name format
    required: false
    default: ${{ github.repository }}

runs:
  using: composite
  steps:
    - name: Ensure snapshot release exists
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        TARGET_REPOSITORY: ${{ inputs.repository }}
      run: |
        set -euo pipefail

        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          SNAPSHOT_NAME="snapshot"
        else
          SNAPSHOT_NAME="snapshot-${{ github.ref_name }}"
        fi

        if gh release -R "$TARGET_REPOSITORY" view "$SNAPSHOT_NAME" >/dev/null 2>&1; then
          echo "Snapshot release '$SNAPSHOT_NAME' already exists"
        else
          gh release -R "$TARGET_REPOSITORY" create "$SNAPSHOT_NAME" \
            -t "Development Snapshot" \
            -n "Latest build from ${{ github.ref_name }}. Unstable. Replaced on each commit." \
            --prerelease
        fi