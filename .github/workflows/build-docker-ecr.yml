name: Build Docker Image for CI

on:
    workflow_dispatch:

    push:
        branches:
             - main
             - v*
        paths:
            - 'scripts/Dockerfile.ci'
            - 'scripts/Dockerfile.ci-tests'
            - 'scripts/Dockerfile.ci-fpga-tests'
            - 'scripts/install_dependencies.sh'
            - 'scripts/download_tflite_binaries.py'
            - 'scripts/configure_python.sh'
            - 'requirements.txt'
            - 'third_party/iree'
            - '.github/workflows/build-docker-ecr.yml'            

    pull_request:
        paths:
            - 'scripts/Dockerfile.ci'
            - 'scripts/Dockerfile.ci-tests'
            - 'scripts/Dockerfile.ci-fpga-tests'
            - 'scripts/install_dependencies.sh'
            - 'scripts/download_tflite_binaries.py'
            - 'scripts/configure_python.sh'
            - 'requirements.txt'
            - 'third_party/iree'
            - '.github/workflows/build-docker-ecr.yml'
     
jobs:

    build-and-push:

        if: ${{ vars.ECR_REPOSITORY != '' }}

        permissions:
            contents: read
            packages: write
            attestations: write
            id-token: write

        runs-on: codebuild-${{vars.CODEBUILD_PROJECT_DOCKER}}-${{ github.run_id }}-${{ github.run_attempt }}

        steps:

          - name: Configure AWS Credentials
            uses: aws-actions/configure-aws-credentials@v6
            if: ${{ github.event_name == 'push' }}
            with:
              aws-region: ${{ vars.AWS_REGION }}
              role-to-assume: ${{ vars.MAIN_BRANCH_ROLE_ARN }}
          
          - name: Show AWS identity
            run: |
              aws sts get-caller-identity

          - name: Log in to ECR
            if: ${{ github.event_name == 'push' }}
            run:
              aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}
            
          - name: Checkout repository
            uses: actions/checkout@v6
            with:
              lfs: true

          - name: Checkout required submodules
            shell: bash
            run: |
              bash scripts/checkout_submodules.sh

          - name: Remove git-lfs hooks
            run: |
              set -x

              # remove the hooks to make sure we can re-install them when we use the checkout in other workflows
              rm -f .git/hooks/*

          - name: Detach the tree
            run: |
              set -x

              # this speeds up the checkout action
              git checkout --detach

          - name: Build and push build Docker image
            uses: docker/build-push-action@v7
            with:
              context: .
              file: scripts/Dockerfile.ci
              push: ${{ github.event_name == 'push' }}
              tags: ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}:${{ ( github.event_name == 'push' && github.ref != 'refs/heads/main') && github.ref_name || 'latest' }}
              build-args: GITHUB_REPOSITORY=${{ github.repository }}
              secrets: |
                "github_token=${{ secrets.GITHUB_TOKEN }}"

          - name: Build and push tests Docker image
            uses: docker/build-push-action@v7            
            with:
              context: .
              file: scripts/Dockerfile.ci-tests
              push: ${{ github.event_name == 'push' }}
              tags: ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}:${{ ( github.event_name == 'push' && github.ref != 'refs/heads/main') && github.ref_name || 'latest' }}-tests
              build-args: GITHUB_REPOSITORY=${{ github.repository }}
              secrets: |
                "github_token=${{ secrets.GITHUB_TOKEN }}"

          - name: Build and push FPGA tests Docker image
            uses: docker/build-push-action@v7            
            with:
              context: .
              file: scripts/Dockerfile.ci-fpga-tests
              push: ${{ github.event_name == 'push' }}
              tags: ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}:${{ ( github.event_name == 'push' && github.ref != 'refs/heads/main') && github.ref_name || 'latest' }}-fpga-tests
              build-args: GITHUB_REPOSITORY=${{ github.repository }}
              secrets: |
                "github_token=${{ secrets.GITHUB_TOKEN }}"
