name: Build and Test

on: 

  pull_request:    
  push:
    branches:
       - main
       - v*
    tags:
        - v*

concurrency:  
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.number || github.sha }}-${{ github.ref_name }}
  cancel-in-progress: true  

env:

  # perform cmodel profiling on pushes and on PRs that have the label "enable-cmodel-profiling"
  ENABLE_CMODEL_PROFILING: ${{ (github.event_name == 'push' || contains(github.event.pull_request.labels.*.name || '', 'enable-cmodel-profiling')) && 'true' || 'false' }}
  
  # generate test status report on PRs that have the label "generate-test-status-report"
  GENERATE_STATUS_REPORT: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name || '', 'generate-test-status-report') && 'true' || 'false' }}

  # use production dashboard for all PRs except those that have the label "test-stage-dashboard"
  DASHBOARD_SERVER: ${{ contains(github.event.pull_request.labels.*.name || '', 'test-stage-dashboard') && vars.DASHBOARD_URL_TORQ_COMPILER_DEV_DASHBOARD_STAGE || vars.DASHBOARD_URL_TORQ_COMPILER_DEV_DASHBOARD_PROD }}  


permissions:
  contents: read
  id-token: write  # this is used to assume AWS roles

jobs:

  check_format:
    name: Check code formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run format check
        run: |
              scripts/format-code
              git diff --exit-code

  docker_image_builder:
    name: Build builder image
    uses: ./.github/workflows/build-docker-image-builder.yml

  docker_image_tests:
    name: Build test image
    uses: ./.github/workflows/build-docker-image-tests.yml

  docker_image_fpga_tests:
    name: Build FPGA test image
    uses: ./.github/workflows/build-docker-image-fpga-tests.yml

  build_mpact:
    name: Build mpact
    uses: ./.github/workflows/build-mpact.yml
   
  build_ko_dependencies:
    name: Build ko dependencies
    uses: ./.github/workflows/build-ko-dependencies.yml

  build:
    name: Build compiler and runtime

    needs: [check_format, docker_image_builder, build_mpact, build_ko_dependencies]

    if: ${{ vars.CODEBUILD_PROJECT_CODEBASE != ''}}

    runs-on:
      - codebuild-${{ vars.CODEBUILD_PROJECT_CODEBASE }}-${{ github.run_id }}-${{ github.run_attempt }}
        image:custom-linux-${{ needs.docker_image_builder.outputs.image_name }}

    env:
      SCCACHE_BUCKET: ${{ vars.SCCACHE_BUCKET }}
      SCCACHE_REGION: ${{ vars.AWS_REGION }}
      SCCACHE_S3_KEY_PREFIX: clang-build
      
    timeout-minutes: 50 # ensure build jobs fail before CodeBuild kills the runners

    steps:

      - name: Make cached checkout visible to workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # actions/checkout and uses keyword can only access files within the current workflow workspace
          ln -s /workspace/code .

          # ensure the github token is used by the checkout action for all operations (the action cannot handle this
          # because it assumes the checkout is not a symlink in the way it sets up authentication)
          AUTH=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
          git config --global "http.https://github.com/.extraheader" "AUTHORIZATION: basic $AUTH"

      - name: Update checkout
        uses: actions/checkout@v6
        with:
          path: code
          lfs: true

      - name: Update required submodules
        working-directory: /workspace/code
        run: |
          bash scripts/checkout_submodules.sh        

      - name: Configure AWS credentials
        uses: ./code/.github/actions/configure-aws-credentials
        id: configure-aws-credentials
        with:
          aws_region: ${{ vars.AWS_REGION }}
          protected_role_arn: ${{ vars.MAIN_BRANCH_ROLE_ARN }}
          non_protected_role_arn: ${{ vars.PULL_REQUEST_ROLE_ARN }}

      - name: Configure python venv for host build and test
        working-directory: /workspace/code
        run: |
          ./scripts/configure_python.sh /workspace/venv /workspace/build

      - name: Download mpact simulation library from cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ needs.build_mpact.outputs.path }}
          key: ${{ needs.build_mpact.outputs.cache_key }}
          fail-on-cache-miss: true

      - name: Download ko dependencies from cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ needs.build_ko_dependencies.outputs.path }}
          key: ${{ needs.build_ko_dependencies.outputs.cache_key }}
          fail-on-cache-miss: true

      - name: Uncompress mpact simulation library
        run: |
          mkdir -p /workspace/code/third_party/coralnpu-mpact/x86_64-Linux
          tar -xzf ${{ needs.build_mpact.outputs.path }} --strip-components=1 -C /workspace/code/third_party/coralnpu-mpact/x86_64-Linux

          find /workspace/code/third_party/coralnpu-mpact/x86_64-Linux

      - name: Configure build for host
        working-directory: /workspace/code
        run: |
          ./scripts/configure_build.sh /workspace/build

      - name: Build for host
        working-directory: /workspace/build
        env:
          SCCACHE_SERVER_UDS: ${{github.workspace}}/sccache.sock
        run: |
          sccache --start-server
          cmake --build . --target torq
          sccache --show-stats

      - name: Configure build for Astra machina
        working-directory: /workspace/code
        run: |
          ./scripts/configure_soc_build.sh /workspace/build-astra-sl /workspace/build astra_machina poky

      - name: Build for Astra machina
        working-directory: /workspace/build-astra-sl
        run: |
          cmake --build . --target torq-run-module torq_kernel_module

      - name: Set tag variable
        id: vars
        working-directory: /workspace/code
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then            
            REF_NAME=${{ github.ref_name }}
            echo "wheel_version=${REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            TIMESTAMP="$(date -u '+%Y%m%dT%H%M%SZ')"
            COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')"
            echo "wheel_version=0.dev0+${TIMESTAMP}.g${COMMIT}" >> $GITHUB_OUTPUT
            echo "tag_name=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build runtime wheels
        working-directory: /workspace/code
        run: |
          # Needed for torq.build_tools discovery.
          source /workspace/venv/bin/activate

          export TORQ_WHEEL_VERSION="${{ steps.vars.outputs.wheel_version }}"

          ./scripts/build_runtime_wheel.sh /workspace/build
          ./scripts/build_runtime_wheel.sh /workspace/build /workspace/build-astra-sl astra_machina poky

      - name: Upload runtime wheels
        uses: actions/upload-artifact@v7
        with:
          name: runtime-wheel
          path: /workspace/code/dist/torq_runtime-*.whl
          retention-days: 30

      - name: Build compiler wheel
        working-directory: /workspace/code
        run: |
          # Needed for torq.build_tools discovery.
          source /workspace/venv/bin/activate

          export TORQ_WHEEL_VERSION="${{ steps.vars.outputs.wheel_version }}"

          ./scripts/build_compiler_wheel.sh /workspace/build

      - name: Upload compiler wheel
        uses: actions/upload-artifact@v7
        with:
          name: compiler-wheel
          path: /workspace/code/dist/torq_compiler-*.whl
          retention-days: 30
        
      - name: Gather release files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          /workspace/code/scripts/assemble_release_docker.sh /workspace/build /workspace/build-astra-sl release
          echo "${{ steps.vars.outputs.tag_name }}" > release/VERSION
          tar -zcf release.tar.gz release

      - name: Upload release files
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: release.tar.gz
          retention-days: 30

  test_cmodel:
    name: Test with C model

    if: ${{ github.event_name == 'push' || !contains(github.event.pull_request.labels.*.name || '', 'skip-test-cmodel') }}

    needs: [ build, docker_image_tests ]
    
    strategy:
      fail-fast: false
      matrix:
        chip_group: ${{ vars.TEST_GROUPS && fromJSON(vars.TEST_GROUPS) || fromJSON('["default.group"]') }}

    # ensure build jobs fail before CodeBuild kills the runners
    timeout-minutes: 50

    runs-on:
          - codebuild-${{ vars.CODEBUILD_PROJECT_CODEBASE }}-${{ github.run_id }}-${{ github.run_attempt }}
            image:custom-linux-${{ needs.docker_image_tests.outputs.image_name }}
            instance-size:xlarge

    outputs:
      s3_cache_path: ${{ steps.run_cmodel_tests.outputs.s3_cache_path }}

    env:      
      TEST_STATUS_REPORT_PATH: ${{ github.workspace }}/host_test_status_${{ matrix.chip_group }}.json
      CMODEL_PROFILING_LOGS_PATH: ${{ github.workspace }}/cmodel_compile_profiling_logs_${{ matrix.chip_group }}

    steps:
      
      - name: Checkout repository
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        uses: actions/checkout@v6
        with:
          # LFS is needed so that third_party/runtimes-prebuilt/libclang_rt.builtins-x86_64.a
          # (attached to x86_64 LLVMCPU dispatches by torq-attach-x86-cpu-objects) is the
          # real archive instead of a pointer file.
          lfs: true
          submodules: false

      # this is required to be able to upload the artifacts to S3
      - name: Configure AWS credentials
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        uses: ./.github/actions/configure-aws-credentials
        id: configure-aws-credentials
        with:
          aws_region: ${{ vars.AWS_REGION }}
          protected_role_arn: ${{ vars.MAIN_BRANCH_ROLE_ARN }}
          non_protected_role_arn: ${{ vars.PULL_REQUEST_ROLE_ARN }}

      - name: Run C model tests
        id: run_cmodel_tests
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        uses: ./.github/actions/tests

        with:
          app_id: ${{ vars.CI_APP_ID }}
          app_private_key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          extra_repo: ${{ vars.EXTRAS_REPO }}
          hf_token: ${{ secrets.HF_TOKEN }}
          # the cache is too big at the moment, disable
          # test_data_cache_artifact: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main' && format('test-cache-{0}', matrix.chip_group)) || '' }} # upload to github only on main branch 
          # We are currently using 36 cores machines for the cmodel tests, dividing by 2 to avoid overloading the machine which can cause timeouts and OOMs
          pytest_args: >-
            -m ci -n 18 -v --show-capture=no --tb=short
            --torq-chips ${{ matrix.chip_group }}
            --tflite-layer-test-generate-full-model-only
            --ignore-binary-mtime
            ${{ env.ENABLE_CMODEL_PROFILING == 'true' && format('--torq-compile-time-profiling-output-dir={0}', env.CMODEL_PROFILING_LOGS_PATH) || '' }}
            ${{ env.GENERATE_STATUS_REPORT == 'true' && format('--try-xfails --save-test-status-report-to={0}', env.TEST_STATUS_REPORT_PATH) || '' }}
          # s3_artifact_bucket: ${{ vars.ARTIFACT_BUCKET }}
          torq_perf_server: ${{ env.DASHBOARD_SERVER }}
          ignore_failures: ${{ env.GENERATE_STATUS_REPORT }}
          batch_name: cmodel-${{ matrix.chip_group }}
          s3_hf_cache_bucket: ${{ vars.SCCACHE_BUCKET }}
          s3_hf_cache_dir: hf_cache

      - name: Upload host test status report
        if: ${{ env.GENERATE_STATUS_REPORT == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: cmodel_test_status_${{ matrix.chip_group }}
          path: ${{ env.TEST_STATUS_REPORT_PATH }}
          retention-days: 60

      - name: Upload compile time profiling logs
        if: ${{ vars.DISABLE_TESTS != 'true' && env.ENABLE_CMODEL_PROFILING == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: cmodel_compile_profiling_logs_${{ matrix.chip_group }}
          path: ${{ env.CMODEL_PROFILING_LOGS_PATH }}
          retention-days: 60

  test_astra_machina_sl:    
    name: Test with Astra Machina SL

    runs-on:
        - codebuild-${{ vars.CODEBUILD_PROJECT_CODEBASE }}-${{ github.run_id }}-${{ github.run_attempt }}
          image:custom-linux-${{ needs.docker_image_tests.outputs.image_name }}

    # run on push (main/version branches), when label test-astra-machina-sl is present on PR and when label generate-test-status-report is present on PR even in case of failure
    if: contains(github.event.pull_request.labels.*.name || '', 'generate-test-status-report') || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name || '', 'test-astra-machina-sl')
    
    needs: [test_cmodel, docker_image_tests ]

    timeout-minutes: 50

    env:
      RUNTIME_PROFILING_OUTPUT_DIR: ${{ github.workspace }}/aws_fpga_profiling_logs_${{ matrix.chip_group }}
      TEST_STATUS_REPORT_PATH: ${{ github.workspace }}/aws_fpga_test_status_${{ matrix.chip_group }}.json

    steps:
      
      - name: Checkout repository
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        uses: actions/checkout@v6
        with:
          # LFS is needed so that third_party/runtimes-prebuilt/libclang_rt.builtins-x86_64.a
          # (attached to x86_64 LLVMCPU dispatches by torq-attach-x86-cpu-objects) is the
          # real archive instead of a pointer file.
          lfs: true
          submodules: false

      # this is required to be able to download artifacts from S3
      - name: Configure AWS credentials
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        uses: ./.github/actions/configure-aws-credentials
        id: configure-aws-credentials
        with:
          aws_region: ${{ vars.AWS_REGION }}
          protected_role_arn: ${{ vars.MAIN_BRANCH_ROLE_ARN }}
          non_protected_role_arn: ${{ vars.PULL_REQUEST_ROLE_ARN }}

      - name: Run Astra Machina SL tests
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        uses: ./.github/actions/tests
        with:
          app_id: ${{ vars.CI_APP_ID }}
          app_private_key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          extra_repo: ${{ vars.EXTRAS_REPO }}
          hf_token: ${{ secrets.HF_TOKEN }}
          use_bench: true
          jenkins_user: ${{ vars.JENKINS_USER }}
          jenkins_api_token: ${{ secrets.JENKINS_API_TOKEN }}
          jenkins_url: ${{ vars.JENKINS_URL }}
          jenkins_job: ${{ vars.JENKINS_JOB }}

          # the cache is too big at the moment, disable
          # download from s3 the test cache generated by the cmodel tests, this gets the cache from the latest completed job in the cmodel matrix, it is ok for the moment
          # we don't download the cache when we are generating status reports because we run FPGA tests in parallel with Cmodel ones
          # precomputed_cache: ${{ env.GENERATE_STATUS_REPORT == 'true' && '' || needs.test_cmodel.outputs.s3_cache_path }}

          pytest_args: >-
            -m astra_machina_sl_ci -n 4
            --torq-runtime-hw-type astra_machina
            --torq-runtime-timeout=20
            --torq-chips sl2610-v1
            --torq-runtime-profiling-output-dir=${{ env.RUNTIME_PROFILING_OUTPUT_DIR }}
            --tflite-layer-test-generate-full-model-only
            --ignore-binary-mtime
            ${{ env.GENERATE_STATUS_REPORT == 'true' && format('--try-xfails --save-test-status-report-to {0}', env.TEST_STATUS_REPORT_PATH) || '' }}
          ignore_failures: ${{ env.GENERATE_STATUS_REPORT }}
          torq_perf_server: ${{ env.DASHBOARD_SERVER }}
          batch_name: fpga-${{ matrix.chip_group }}
          s3_hf_cache_bucket: ${{ vars.SCCACHE_BUCKET }}
          s3_hf_cache_dir: hf_cache
                
      - name: Upload Astra Machina SL test status report
        if: ${{ env.GENERATE_STATUS_REPORT == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: astra_machina_sl_test_status
          path: ${{ env.TEST_STATUS_REPORT_PATH }}
          retention-days: 60

  test_aws_fpga:    
    name: Test with AWS FPGA on ${{ matrix.chip_group }}

    # TODO: here we should use the built image, not the default image
    runs-on: ${{ vars.DISABLE_TESTS != 'true' && format('torq-fpga-{0}-{1}', github.run_id, github.run_attempt) || 'ubuntu-latest' }}

    # run on push (main/version branches), and when either label test-aws or generate-test-status-report is present on PR
    if: contains(github.event.pull_request.labels.*.name || '', 'generate-test-status-report') || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name || '', 'test-aws')
    
    needs: [test_cmodel, docker_image_fpga_tests ]

    timeout-minutes: 50

    strategy:
      fail-fast: false
      matrix:
        chip_group: ${{ vars.TEST_GROUPS && fromJSON(vars.TEST_GROUPS) || fromJSON('["default.group"]') }}

    env:      
      RUNTIME_PROFILING_OUTPUT_DIR: ${{ github.workspace }}/aws_fpga_profiling_logs_${{ matrix.chip_group }}
      TEST_STATUS_REPORT_PATH: ${{ github.workspace }}/aws_fpga_test_status_${{ matrix.chip_group }}.json

    steps:
    
      - name: Checkout repository
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        uses: actions/checkout@v6
        with:
          # LFS is needed so that third_party/runtimes-prebuilt/libclang_rt.builtins-x86_64.a
          # (attached to x86_64 LLVMCPU dispatches by torq-attach-x86-cpu-objects) is the
          # real archive instead of a pointer file.
          lfs: true
          submodules: false

      # this is required to be able to download artifacts from S3
      - name: Configure AWS credentials
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        uses: ./.github/actions/configure-aws-credentials
        id: configure-aws-credentials
        with:
          aws_region: ${{ vars.AWS_REGION }}
          protected_role_arn: ${{ vars.MAIN_BRANCH_ROLE_ARN }}
          non_protected_role_arn: ${{ vars.PULL_REQUEST_ROLE_ARN }}

      - name: Clear FPGA slot
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        run: |
          # the instance on which this is running may have already served another shell
          # so we need to clear the slot before running our tests to ensure a clean state
          fpga-clear-local-image -S 0

      - name: Run AWS FPGA model tests
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        uses: ./.github/actions/tests
        with:
          app_id: ${{ vars.CI_APP_ID }}
          app_private_key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          extra_repo: ${{ vars.EXTRAS_REPO }}
          hf_token: ${{ secrets.HF_TOKEN }}

          # the cache is too big at the moment, disable
          # download from s3 the test cache generated by the cmodel tests, this gets the cache from the latest completed job in the cmodel matrix, it is ok for the moment
          # we don't download the cache when we are generating status reports because we run FPGA tests in parallel with Cmodel ones
          # precomputed_cache: ${{ env.GENERATE_STATUS_REPORT == 'true' && '' || needs.test_cmodel.outputs.s3_cache_path }}

          pytest_args: >-
            -m fpga_ci -n auto 
            --torq-runtime-hw-type aws_fpga
            --torq-runtime-timeout=20
            --torq-chips ${{ matrix.chip_group }}
            --torq-runtime-profiling-output-dir=${{ env.RUNTIME_PROFILING_OUTPUT_DIR }}
            --tflite-layer-test-generate-full-model-only
            --ignore-binary-mtime
            ${{ env.GENERATE_STATUS_REPORT == 'true' && format('--try-xfails --save-test-status-report-to {0}', env.TEST_STATUS_REPORT_PATH) || '' }}
          ignore_failures: ${{ env.GENERATE_STATUS_REPORT }}
          torq_perf_server: ${{ env.DASHBOARD_SERVER }}
          batch_name: fpga-${{ matrix.chip_group }}
          s3_hf_cache_bucket: ${{ vars.SCCACHE_BUCKET }}
          s3_hf_cache_dir: hf_cache
      
      - name: Upload AWS FPGA profiling logs
        if: ${{ vars.DISABLE_TESTS != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: aws_fpga_profiling_logs_${{ matrix.chip_group }}
          path: ${{ env.RUNTIME_PROFILING_OUTPUT_DIR }}
          retention-days: 60
          
      - name: Upload AWS FPGA test status report
        if: ${{ env.GENERATE_STATUS_REPORT == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: aws_fpga_test_status_${{ matrix.chip_group }}
          path: ${{ env.TEST_STATUS_REPORT_PATH }}
          retention-days: 60

  # build the user part of the docs only
  user_doc_build:
      name : Build user guide
      runs-on: ubuntu-latest
      steps:
          - name: Checkout repository              
            uses: actions/checkout@v6
            with:
              lfs: true
              submodules: false          

          - name: Build user manual
            uses: syna-astra-dev/action-doc-publish/actions/doc-build@v3
            with:
              doc_dir: doc/user-manual

          - name: Upload user manual artifact              
            uses: actions/upload-artifact@v7
            with:
              name: user-manual
              path: _build/html
              retention-days: 7
          
          - name: Clear output directory
            run: |
              rm -rf _build

          - name: Build website
            uses: syna-astra-dev/action-doc-publish/actions/doc-build@v3
            with:
              doc_dir: doc

          - name: Upload website artifact              
            uses: actions/upload-artifact@v7
            with:
              name: website
              path: _build/html
              retention-days: 7

  docker_release:
    name: Release Docker image
    if: github.event_name == 'push'
    needs: test_aws_fpga
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Download the compiler and runtime
        uses: actions/download-artifact@v8
        with:
          name: release
          path: release

      - name: Extract the compiler and runtime
        working-directory: release
        run: |
          tar -zxf release.tar.gz --strip-components=1

      - name: Docker meta (generate tags & labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/compiler          
          tags: |
            type=ref,event=branch  
            type=ref,event=tag

            type=ref,event=branch,enable=${{ github.event_name == 'push' }}

            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.github_token }}
      
      - name: Build and push release docker
        uses: docker/build-push-action@v7
        with:
          context: release
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          
  publish_release:
    name: Publish Release
    needs: [build, user_doc_build]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    
    permissions:
      contents: write
    
    outputs:
      tag_name: ${{ steps.upload_assets.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: release
          path: dist

      - name: Download user documentation
        uses: actions/download-artifact@v8
        with:
          name: user-manual
          path: dist/user_manual

      - name: Download full documentation
        uses: actions/download-artifact@v8
        with:
          name: website
          path: dist/website

      - name: Download runtime wheel
        uses: actions/download-artifact@v8
        with:
          name: runtime-wheel
          path: dist

      - name: Download compiler wheel
        uses: actions/download-artifact@v8
        with:
          name: compiler-wheel
          path: dist

      - name: Compress the user manual as a zip
        run: |
          cd dist
          zip -r user_manual.zip user_manual
          rm -rf user_manual

      - name: Compress the full documentation as a zip
        run: |
          cd dist/website
          zip -r ../documentation.zip .   # this is the name and format expected by site building action
          cd ..
          rm -rf website

      - name: Upload assets to release        
        id: upload_assets
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}          
        run: |

          CREATION_FLAGS=""
  
          # determine the release tag name, title and note based on the ref that triggered the workflow
          if [[ "${{ github.ref }}" == refs/heads/* ]]; then  
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              TAG_NAME="snapshot"              
            else
              TAG_NAME="snapshot-${{ github.ref_name }}"              
            fi
            TITLE="Development Snapshot (${{ github.ref_name }})"
            CREATION_FLAGS="--prerelease"
            NOTE="Latest build from ${{ github.ref_name }}. Unstable. Replaced on each commit."
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            TITLE="Torq version ${{ github.ref_name }}"
            NOTE="Release for tag ${{ github.ref_name }}."
            CREATION_FLAGS="--draft"
          else
            echo "Not a branch or tag ref: ${{ github.ref }}"
            exit 1
          fi

          # ensure the release exists, creating it if necessary
          if gh release -R "$TARGET_REPOSITORY" view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release on tag '$TAG_NAME' already exists"
          else
            gh release -R "$TARGET_REPOSITORY" create "$TAG_NAME" \
              -t "$TITLE" \
              -n "$NOTE" \
              $CREATION_FLAGS
          fi

          # remove old wheel assets since we will change their name
          gh release view "$TAG_NAME" --json assets --jq '.assets[] | select(.name | endswith(".whl")) | .name' |
          while IFS= read -r asset; do
            echo "Deleting asset: $asset"
            gh release delete-asset "$TAG_NAME" "$asset" --yes
          done

          # upload the new assets, clobbering any existing ones with the same name
          gh release upload "$TAG_NAME" dist/* --clobber

          echo "Release published successfully for tag '$TAG_NAME'"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

  update_site:
    name: Update website
    runs-on: ubuntu-latest
    needs: publish_release
    if: ${{ github.event_name == 'push' }}

    environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}v/${{ needs.publish_release.outputs.tag_name }}
 
    concurrency:
        group: publish-site

    # permissions so that we can fetch workflow artifacts and publish the website
    permissions:
        pages: write
        actions: write
        id-token: write
        contents: read

    steps:

        - name: Create site with all versions of the documentation
          uses: syna-astra-dev/action-doc-publish/actions/doc-create-site@v4
          id: create_site
          with:
            repository: ${{ github.repository }}
            token: ${{ github.token }}
            disable_branch_docs: true

        - name: Upload GitHub Pages artifact
          uses: actions/upload-pages-artifact@v5
          with:
            path: _build/site/html
            retention-days: 1   # we can discard the artifacts after the site is published
            include-hidden-files: true

        # WARNING: due to a bug in github (see https://github.com/actions/deploy-pages/issues/383)
        # the deploy-pages action will not update the site when the current main is tagged
        - name: Deploy website
          id: deployment
          uses: actions/deploy-pages@v5

  mark_complete:
    name: Mark tests complete
    if: always()
    needs: [test_cmodel, test_aws_fpga, test_astra_machina_sl]
    uses: ./.github/workflows/mark-workflow-complete.yml
