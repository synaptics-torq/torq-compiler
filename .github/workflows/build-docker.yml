name: Build Docker for local dev

on:
    workflow_dispatch:

    push:
        branches:
            - main
            - v*
        paths:            
            - '.github/workflows/build-docker.yml'
            - 'scripts/Dockerfile.localdev'
            - 'scripts/install_dependencies.sh'
            - 'scripts/download_tflite_binaries.py'

    pull_request:
        paths:
            - '.github/workflows/build-docker.yml'
            - 'scripts/Dockerfile.localdev'
            - 'scripts/install_dependencies.sh'
            - 'scripts/download_tflite_binaries.py'
jobs:

    build-and-push:

        permissions:
            contents: read
            packages: write
            attestations: write
            id-token: write

        runs-on: ubuntu-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v6

        - name: Log in to Docker Registry
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.github_token }}

        - name: Build and push Docker image
          uses: docker/build-push-action@v7
          id: push
          with:
            context: .
            file: scripts/Dockerfile.localdev
            push: ${{ github.event_name == 'push' }}
            tags: ghcr.io/${{ github.repository }}/builder:${{ ( github.event_name == 'push' && github.ref != 'refs/heads/main') && github.ref_name || 'latest' }}
            build-args: GITHUB_REPOSITORY=${{ github.repository }}
            secrets: |
                "github_token=${{ secrets.GITHUB_TOKEN }}"
